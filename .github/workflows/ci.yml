name: SvelteKit Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      # Findet Syntax- und Typfehler in .svelte und .ts Dateien
      - name: Svelte Check
        run: npm run check

      - name: Lint
        run: npm run lint
